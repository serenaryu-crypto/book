<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나만의 문학 큐레이터</title>
<style>
/* 문학찐의 영혼, 나눔명조 폰트 */
@import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body { 
  font-family: 'Nanum Myeongjo', serif; 
  background: #8faadc; 
  min-height: 100vh; 
  display: flex; 
  justify-content: center; 
  align-items: center;
  padding: 2rem 1rem; 
  color: #111;
}

.wrap { width: 100%; max-width: 420px; }

#input-section, .card { 
  background-color: #f1daba !important; 
  border: 1px solid #111; 
  padding: 3rem 2.5rem; 
  position: relative;
  min-height: 600px; 
  display: flex;
  flex-direction: column;
  box-shadow: 10px 10px 20px rgba(0,0,0,0.15); 
}

.book-series {
  position: absolute;
  top: 2rem;
  right: 2.5rem;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.publisher-logo {
  position: absolute;
  bottom: 2rem;
  left: 2.5rem;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

h1 { 
  font-size: 34px; 
  font-weight: 400; 
  letter-spacing: -1.5px; 
  margin-top: 5rem; 
  margin-bottom: 1rem; 
  line-height: 1.2;
}

.sub { 
  font-size: 16px; 
  color: #333; 
  margin-bottom: 3rem; 
  letter-spacing: -0.5px;
}

textarea { 
  width: 100%; 
  resize: none; 
  font-size: 15px; 
  line-height: 1.8; 
  padding: 10px 0; 
  border: none; 
  border-bottom: 1px solid #555; 
  outline: none; 
  color: #111; 
  background: transparent; 
  font-family: inherit; 
}
textarea::placeholder { color: #888; font-style: italic; }

.chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 2rem 0; }
.chip { 
  font-size: 12px; 
  padding: 6px 12px; 
  border-radius: 0; 
  border: 1px solid #111; 
  background: transparent; 
  color: #111; 
  cursor: pointer; 
  font-family: inherit; 
}
.chip:hover { background: #111; color: #f1daba; }

.btn { 
  margin-top: auto; 
  width: 100%; 
  padding: 16px; 
  font-size: 15px; 
  font-weight: 800; 
  border: 1px solid #111; 
  background: transparent; 
  color: #111; 
  cursor: pointer; 
  font-family: inherit; 
  transition: all 0.2s;
}
.btn:hover { background: #111; color: #f1daba; }

.spinner-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 600px; gap: 16px; background-color: #f1daba; border: 1px solid #111; box-shadow: 10px 10px 20px rgba(0,0,0,0.15); }
.spinner { width: 36px; height: 36px; border: 2px solid #ccc; border-top: 2px solid #111; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner-label { font-size: 13px; font-weight: 700; }

.result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.result-query { font-size: 14px; font-weight: 700; color: #fff; } 
.reset-btn { font-size: 13px; font-weight: 700; color: #fff; background: none; border: 1px solid #fff; padding: 4px 10px; cursor: pointer; font-family: inherit; }

.cards { display: flex; flex-direction: column; gap: 24px; }

.card-genre { font-size: 12px; font-weight: 800; opacity: 0.8; margin-bottom: 2rem; border-bottom: 1px solid #111; padding-bottom: 8px; display: inline-block; }
.card-title { font-size: 26px; font-weight: 800; letter-spacing: -1px; line-height: 1.3; margin-bottom: 12px; }
.card-author { font-size: 14px; opacity: 0.8; margin-bottom: 1.5rem; }

/* 표지 이미지 스타일 (고전적인 액자 느낌) */
.cover-wrap { text-align: center; margin-bottom: 1.5rem; min-height: 150px; }
.book-cover { 
  max-width: 140px; 
  box-shadow: 5px 5px 15px rgba(0,0,0,0.2); 
  border: 1px solid #ddd; 
  display: none; /* 이미지가 불러와지면 나타남 */
}

.card-reason { font-size: 15px; line-height: 1.8; flex: 1; }
.store-links { display: flex; gap: 8px; margin-top: 2rem; flex-wrap: wrap; }
.store-link { font-size: 12px; font-weight: 700; padding: 8px 0; width: calc(50% - 4px); text-align: center; border: 1px solid #111; text-decoration: none; color: #111; }
.store-link:hover { background: #111; color: #f1daba; }

#loading-section { display: none; }
#result-section { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <div id="input-section">
    <div class="book-series">나만의 문학 큐레이터 001</div>
    <h1>어떤 책이<br>필요해요?</h1>
    <p class="sub">당신의 상황을 적어주세요</p>
    
    <textarea id="query" rows="4" placeholder="요즘 너무 지쳐서 위로가 되는 고전 소설이 필요해..."></textarea>
    
    <div class="chips">
      <button class="chip" onclick="go('밑바닥까지 우울한 소설')">밑바닥까지 우울한 소설</button>
      <button class="chip" onclick="go('문장이 압도적으로 아름다운 책')">문장이 압도적으로 아름다운 책</button>
      <button class="chip" onclick="go('여름밤에 어울리는 단편')">여름밤에 어울리는 단편</button>
    </div>
    
    <button class="btn" id="main-btn" onclick="go(null)">책 처방받기</button>
    <div class="publisher-logo">나만의 출판사</div>
  </div>

  <div id="loading-section">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <p class="spinner-label">서재를 뒤지는 중...</p>
    </div>
  </div>

  <div id="result-section">
    <div class="result-header">
      <span class="result-query" id="rq"></span>
      <button class="reset-btn" onclick="goBack()">표지로 돌아가기</button>
    </div>
    <div class="cards" id="cards"></div>
  </div>
</div>

<script>
// n8n 웹훅 URL
var WEBHOOK_URL = "https://serenaryu89.app.n8n.cloud/webhook/4960dd64-2eaf-444d-9920-0194eb7f3e2a";
// 발급받으신 알라딘 TTB 키
var ALADIN_TTB_KEY = "ttb-koeun-mail0329001";

var STORES = [
  { name: "알라딘", base: "https://www.aladin.co.kr/search/wsearchresult.aspx?SearchWord=", suffix: "&SearchTarget=Book" },
  { name: "YES24", base: "https://www.yes24.com/Product/Search?domain=ALL&query=", suffix: "" },
  { name: "교보문고", base: "https://search.kyobobook.co.kr/search?keyword=", suffix: "" },
  { name: "쿠팡", base: "https://www.coupang.com/np/search?q=", suffix: "" }
];

function show(id) {
  document.getElementById("input-section").style.display = id === "input" ? "flex" : "none";
  document.getElementById("loading-section").style.display = id === "loading" ? "flex" : "none";
  document.getElementById("result-section").style.display = id === "result" ? "block" : "none";
}

function go(chip) {
  var q = chip || document.getElementById("query").value.trim();
  if (!q) return;
  show("loading");

  fetch(WEBHOOK_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ query: q })
  }).then(function(r) {
    return r.text(); 
  }).then(function(data) {
    var raw = data.replace(/```json/gi, "").replace(/```/g, "").trim();
    var parsed = JSON.parse(raw);

    document.getElementById("rq").textContent = "\u201c" + q + "\u201d";
    var el = document.getElementById("cards");
    el.innerHTML = "";

    // 클로저 문제를 피하기 위해 forEach 사용
    parsed.books.forEach(function(b, j) {
      var links = "";
      for (var k = 0; k < STORES.length; k++) {
        var s = STORES[k];
        links += "<a class='store-link' href='" + s.base + encodeURIComponent(b.title) + s.suffix + "' target='_blank'>" + s.name + "</a>";
      }
      
      var card = document.createElement("div");
      card.className = "card";
      
      var publisherText = b.publisher ? " · " + b.publisher : "";
      var yearText = b.year ? " (" + b.year + ")" : "";
      
      // 고유한 이미지 ID 부여 (cover-0, cover-1 등)
      var imgId = "cover-" + j;
      
      card.innerHTML =
        "<p class='card-genre'>" + (b.genre || "").toUpperCase() + "</p>" +
        "<h2 class='card-title'>" + b.title + "</h2>" +
        "<p class='card-author'>" + b.author + publisherText + yearText + "</p>" +
        "<div class='cover-wrap'><img id='" + imgId + "' class='book-cover' src='' alt='" + b.title + " 표지'></div>" +
        "<p class='card-reason'>" + b.reason + "</p>" +
        "<div class='store-links'>" + links + "</div>";
        
      el.appendChild(card);

      // ★ 알라딘 API로 표지 가져오기 (CORS 우회를 위해 allorigins 프록시 사용)
      var aladinApiUrl = "http://www.aladin.co.kr/ttb/api/ItemSearch.aspx?ttbkey=" + ALADIN_TTB_KEY + "&Query=" + encodeURIComponent(b.title) + "&QueryType=Title&MaxResults=1&start=1&SearchTarget=Book&output=js&Version=20131101";
      var proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(aladinApiUrl);

      fetch(proxyUrl)
        .then(function(res) { return res.json(); })
        .then(function(proxyData) {
          var aladinData = JSON.parse(proxyData.contents);
          if (aladinData.item && aladinData.item.length > 0) {
            var coverImgUrl = aladinData.item[0].cover;
            var imgElement = document.getElementById(imgId);
            if (imgElement && coverImgUrl) {
              // 화질을 조금 더 좋게 하기 위한 트릭 (coversum -> cover200)
              imgElement.src = coverImgUrl.replace('coversum', 'cover200');
              imgElement.style.display = "inline-block";
            }
          }
        })
        .catch(function(err) {
          console.log("표지 로드 실패:", err); // 표지를 못 찾아도 텍스트는 정상적으로 뜨게 처리
        });
    });
    
    show("result");
  }).catch(function(e) {
    show("input");
    alert("다시 시도해주세요: " + e.message);
  });
}

function goBack() {
  show("input");
  document.getElementById("query").value = "";
}

document.getElementById("query").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); go(null); }
});
</script>
</body>
</html>
