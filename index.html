<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나만의 문학 큐레이터</title>
<style>
/* 문학찐의 영혼, 나눔명조 폰트 */
@import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body { 
  font-family: 'Nanum Myeongjo', serif; 
  background: #8faadc; 
  min-height: 100vh; 
  display: flex; 
  justify-content: center; 
  align-items: center;
  padding: 1rem; 
  color: #000;
  text-rendering: optimizeLegibility;
}

.wrap { width: 100%; max-width: 420px; }

/* ★ 메인 박스 디자인 (희끗함 방지를 위해 테두리 두께 조절) */
#input-section, #loading-section, .card { 
  background-color: #f1daba !important; 
  border: 1.5px solid #111; 
  padding: 3rem 2rem; 
  position: relative;
  min-height: 600px; 
  display: flex;
  flex-direction: column;
  box-shadow: 10px 10px 0px rgba(0,0,0,0.1); 
  width: 100%;
  /* 명조체 뭉침 방지 */
  -webkit-text-stroke: 0.1px #000; 
}

.book-series {
  position: absolute;
  top: 1.5rem;
  right: 2rem;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.publisher-logo {
  position: absolute;
  bottom: 1.5rem; 
  left: 2rem;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

h1 { 
  font-size: 32px; 
  font-weight: 800; 
  letter-spacing: -1.5px; 
  margin-top: 4rem; 
  margin-bottom: 1rem; 
  line-height: 1.2;
}

.sub { 
  font-size: 15px; 
  color: #222; 
  font-weight: 800;
  margin-bottom: 2.5rem; 
}

textarea { 
  width: 100%; 
  resize: none; 
  font-size: 15px; 
  line-height: 1.8; 
  padding: 10px 0; 
  border: none; 
  border-bottom: 2px solid #000; 
  outline: none; 
  color: #000; 
  font-weight: 800;
  background: transparent; 
  font-family: inherit; 
}

.chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 2rem 0; }
.chip { 
  font-size: 12px; 
  padding: 8px 12px; 
  border: 1px solid #000; 
  background: transparent; 
  color: #000; 
  font-weight: 800;
  cursor: pointer; 
  font-family: inherit; 
}

.btn { 
  margin-top: auto; 
  margin-bottom: 2rem; 
  width: 100%; 
  padding: 16px; 
  font-size: 16px; 
  font-weight: 800; 
  border: 1.5px solid #000; 
  background: transparent; 
  cursor: pointer; 
  font-family: inherit; 
}
.btn:hover { background: #000; color: #f1daba; }

/* ★ 결과 페이지 상단 (겹침 문제 해결) */
.result-header { 
  display: flex; 
  flex-direction: column; /* 세로 배치로 변경하여 겹침 방지 */
  gap: 12px;
  margin-bottom: 24px; 
  width: 100%; 
}
.result-query { 
  font-size: 18px; 
  font-weight: 800; 
  color: #fff; 
  line-height: 1.4;
  word-break: keep-all;
} 
.reset-btn { 
  align-self: flex-start;
  font-size: 12px; 
  font-weight: 800; 
  color: #fff; 
  background: none; 
  border: 1.5px solid #fff; 
  padding: 6px 12px; 
  cursor: pointer; 
  font-family: inherit; 
}

.cards { display: flex; flex-direction: column; gap: 32px; width: 100%; }

.card-genre { font-size: 12px; font-weight: 800; color: #000; margin-bottom: 1.5rem; border-bottom: 2px solid #000; padding-bottom: 4px; display: inline-block; }
.card-title { font-size: 24px; font-weight: 800; line-height: 1.3; margin-bottom: 10px; }
.card-author { font-size: 14px; font-weight: 800; margin-bottom: 1.5rem; }

.cover-wrap { text-align: center; margin-bottom: 1.5rem; }
.book-cover { 
  max-width: 150px; 
  box-shadow: 10px 10px 20px rgba(0,0,0,0.2); 
  display: none; 
}

.card-reason { font-size: 15px; font-weight: 700; line-height: 1.8; margin-bottom: 2rem; }

.store-links { display: flex; gap: 10px; flex-wrap: wrap; }
.store-link { 
  font-size: 12px; 
  font-weight: 800; 
  padding: 10px 0; 
  width: calc(50% - 5px); 
  text-align: center; 
  border: 1px solid #000; 
  text-decoration: none; 
  color: #000; 
}

#loading-section { display: none; }
#result-section { display: none; }

/* 로딩 스피너 */
.spinner-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; }
.spinner { width: 40px; height: 40px; border: 4px solid rgba(0,0,0,0.1); border-top: 4px solid #000; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <div id="input-section">
    <div class="book-series">나만의 문학 큐레이터 001</div>
    <h1>어떤 책이<br>필요해요?</h1>
    <p class="sub">당신의 오늘에 문장을 처방합니다.</p>
    <textarea id="query" rows="3" placeholder="예: 여름밤에 어울리는 한국 단편 소설"></textarea>
    <div class="chips">
      <button class="chip" onclick="go('밑바닥까지 우울한 소설')">#우울한_소설</button>
      <button class="chip" onclick="go('문장이 아름다운 민음사 책')">#아름다운_문장</button>
      <button class="chip" onclick="go('여름밤에 어울리는 단편')">#여름밤_단편</button>
      <button class="chip" onclick="go('인생의 방향을 잃었을 때')">#인생의_나침반</button> 
    </div>
    <button class="btn" onclick="go(null)">책 처방받기</button>
    <div class="publisher-logo">나만의 출판사</div>
  </div>

  <div id="loading-section">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <p style="font-weight:800;">서재를 뒤지는 중...</p>
    </div>
  </div>

  <div id="result-section">
    <div class="result-header">
      <span class="result-query" id="rq"></span>
      <button class="reset-btn" onclick="goBack()">← 다른 책 처방받기</button>
    </div>
    <div class="cards" id="cards"></div>
  </div>
</div>

<script>
var WEBHOOK_URL = "https://serenaryu89.app.n8n.cloud/webhook/4960dd64-2eaf-444d-9920-0194eb7f3e2a";
var ALADIN_TTB_KEY = "ttb-koeun-mail0329001";

function show(id) {
  document.getElementById("input-section").style.display = id === "input" ? "flex" : "none";
  document.getElementById("loading-section").style.display = id === "loading" ? "flex" : "none";
  document.getElementById("result-section").style.display = id === "result" ? "block" : "none";
  window.scrollTo(0,0);
}

function go(chip) {
  var q = chip || document.getElementById("query").value.trim();
  if (!q) return;
  show("loading");

  fetch(WEBHOOK_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ query: q })
  }).then(r => r.text()).then(data => {
    var raw = data.replace(/```json/gi, "").replace(/```/g, "").trim();
    var parsed = JSON.parse(raw);
    if(!parsed.books || parsed.books.length === 0) {
        alert("적절한 책을 찾지 못했습니다. 조금 더 구체적으로 적어주세요!");
        show("input");
        return;
    }

    document.getElementById("rq").textContent = "“" + q + "”";
    var el = document.getElementById("cards");
    el.innerHTML = "";

    parsed.books.forEach((b, j) => {
      var imgId = "cover-" + j;
      var card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <p class="card-genre">${(b.genre || "문학").toUpperCase()}</p>
        <h2 class="card-title">${b.title}</h2>
        <p class="card-author">${b.author} · ${b.publisher} (${b.year})</p>
        <div class="cover-wrap"><img id="${imgId}" class="book-cover" src="" alt="표지"></div>
        <p class="card-reason">${b.reason}</p>
        <div class="store-links">
          <a class="store-link" href="https://www.aladin.co.kr/search/wsearchresult.aspx?SearchWord=${encodeURIComponent(b.title)}" target="_blank">알라딘</a>
          <a class="store-link" href="https://search.kyobobook.co.kr/search?keyword=${encodeURIComponent(b.title)}" target="_blank">교보문고</a>
        </div>
      `;
      el.appendChild(card);

      // 알라딘 표지 로드
      fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`http://www.aladin.co.kr/ttb/api/ItemSearch.aspx?ttbkey=${ALADIN_TTB_KEY}&Query=${encodeURIComponent(b.title)}&MaxResults=1&output=js&Version=20131101`)}`)
        .then(res => res.json()).then(proxyData => {
          var aladin = JSON.parse(proxyData.contents);
          if (aladin.item && aladin.item[0]) {
            var img = document.getElementById(imgId);
            img.src = aladin.item[0].cover.replace('coversum', 'cover500');
            img.style.display = "inline-block";
          }
        });
    });
    show("result");
  }).catch(e => {
    show("input");
    alert("오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
  });
}

function goBack() { show("input"); document.getElementById("query").value = ""; }
</script>
</body>
</html>
